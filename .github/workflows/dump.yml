name: Firmware Image Extractor

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct Download Link'
        required: true
      compression:
        description: 'Compression level'
        required: true
        default: '6'
        type: choice
        options: ['0', '3', '6', '9']
      upload_destination:
        description: 'Upload destination'
        required: true
        default: 'gofile'
        type: choice
        options: ['gofile', 'github releases']
      extract_system: { description: 'system.img', type: boolean, default: false }
      extract_system_ext: { description: 'system_ext.img', type: boolean, default: false }
      extract_product: { description: 'product.img', type: boolean, default: false }
      extract_vendor: { description: 'vendor.img', type: boolean, default: false }
      extract_vendor_boot: { description: 'vendor_boot.img', type: boolean, default: false }
      extract_vendor_dlkm: { description: 'vendor_dlkm.img', type: boolean, default: false }
      extract_system_dlkm: { description: 'system_dlkm.img', type: boolean, default: false }
      extract_odm: { description: 'odm.img', type: boolean, default: false }
      extract_odm_dlkm: { description: 'odm_dlkm.img', type: boolean, default: false }
      extract_boot: { description: 'boot.img', type: boolean, default: false }
      extract_init_boot: { description: 'init_boot.img', type: boolean, default: false }
      extract_vbmeta: { description: 'vbmeta.img', type: boolean, default: false }
      extract_vbmeta_system: { description: 'vbmeta_system.img', type: boolean, default: false }
      extract_dtbo: { description: 'dtbo.img', type: boolean, default: false }
      extract_recovery: { description: 'recovery.img', type: boolean, default: false }

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq xz-utils lz4 unzip curl binutils android-sdk-libsparse-utils

      - name: Setup tools
        run: chmod +x bin/lp/* bin/ext4/* bin/erofs-utils/* bin/py_scripts/* upload_gofile.sh scripts/dump.sh

      - name: Get firmware metadata
        id: meta
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
        run: |
          curl -sL --range 0-2097151 "${{ github.event.inputs.url }}" > /tmp/fw_peek.bin
          AP_FILE=$(strings /tmp/fw_peek.bin | grep -oP 'AP_\w+\.(tar\.md5|tar)' | head -1)
          rm -f /tmp/fw_peek.bin
          AP_SEGMENT=$(echo "$AP_FILE" | cut -d'_' -f2)
          RELEASE_DATE=$(date +"%-d-%-m-%Y %-I:%M %p")
          BASE_TAG=$(date +"%d%m%Y_%H%M%S")
          RELEASE_TAG="$BASE_TAG"
          SUFFIX=1
          while gh release view "${BASE_TAG}_${SUFFIX}" &>/dev/null 2>&1; do SUFFIX=$((SUFFIX + 1)); done
          [[ $SUFFIX -gt 1 ]] && RELEASE_TAG="${BASE_TAG}_${SUFFIX}"
          echo "ap_segment=$AP_SEGMENT" >> $GITHUB_OUTPUT
          echo "release_date=$RELEASE_DATE" >> $GITHUB_OUTPUT
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

      - name: Build partition list & run extractor
        run: |
          PARTS=""
          ${{ github.event.inputs.extract_system }} && PARTS="$PARTS system"
          ${{ github.event.inputs.extract_system_ext }} && PARTS="$PARTS system_ext"
          ${{ github.event.inputs.extract_product }} && PARTS="$PARTS product"
          ${{ github.event.inputs.extract_vendor }} && PARTS="$PARTS vendor"
          ${{ github.event.inputs.extract_vendor_boot }} && PARTS="$PARTS vendor_boot"
          ${{ github.event.inputs.extract_vendor_dlkm }} && PARTS="$PARTS vendor_dlkm"
          ${{ github.event.inputs.extract_system_dlkm }} && PARTS="$PARTS system_dlkm"
          ${{ github.event.inputs.extract_odm }} && PARTS="$PARTS odm"
          ${{ github.event.inputs.extract_odm_dlkm }} && PARTS="$PARTS odm_dlkm"
          ${{ github.event.inputs.extract_boot }} && PARTS="$PARTS boot"
          ${{ github.event.inputs.extract_init_boot }} && PARTS="$PARTS init_boot"
          ${{ github.event.inputs.extract_vbmeta }} && PARTS="$PARTS vbmeta"
          ${{ github.event.inputs.extract_vbmeta_system }} && PARTS="$PARTS vbmeta_system"
          ${{ github.event.inputs.extract_dtbo }} && PARTS="$PARTS dtbo"
          ${{ github.event.inputs.extract_recovery }} && PARTS="$PARTS recovery"
          PARTS="${PARTS# }"
          [[ -z "$PARTS" ]] && { echo "❌ No partitions selected"; exit 1; }
          bash scripts/dump.sh "${{ github.event.inputs.url }}" "${{ github.event.inputs.compression }}" $PARTS

      - name: Upload to GoFile
        if: ${{ github.event.inputs.upload_destination == 'gofile' }}
        run: |
          [[ -d processed && -n "$(ls -A processed)" ]] || { echo "❌ Nothing to upload"; exit 1; }
          cd processed && zip -r ../firmware-dump.zip . && cd ..
          bash upload_gofile.sh firmware-dump.zip

      - name: Upload to GitHub Releases
        if: ${{ github.event.inputs.upload_destination == 'github releases' }}
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
        run: |
          [[ -d processed && -n "$(ls -A processed)" ]] || { echo "❌ Nothing to upload"; exit 1; }
          NOTES=$(mktemp); ASSETS=(); LIMIT=2147483648
          for F in processed/*; do
            [[ -f "$F" ]] || continue
            SIZE=$(stat -c%s "$F"); NAME=$(basename "$F"); PART=$(echo "$NAME" | sed 's/\.img.*//')
            if [[ $SIZE -gt $LIMIT ]]; then
              bash upload_gofile.sh "$F" && URL=$(cat download_url.txt) && echo "${PART}: ${URL}" >> "$NOTES" || echo "${PART}: ❌ Upload failed" >> "$NOTES"
            else
              ASSETS+=("$F")
            fi
          done
          gh release create "${{ steps.meta.outputs.release_tag }}" --title "${{ steps.meta.outputs.ap_segment }} | ${{ steps.meta.outputs.release_date }}" --notes-file "$NOTES" "${ASSETS[@]}"
          rm -f "$NOTES"
