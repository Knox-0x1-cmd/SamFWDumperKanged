name: System Files Extractor

on:
  workflow_dispatch:
    inputs:
      url: { description: 'Direct Download Link', required: true }
      extract_super_config: { description: 'super config (Repack metadata)', type: boolean, default: false }
      extract_app: { description: 'app (Preinstalled APKs)', type: boolean, default: false }
      extract_priv_app: { description: 'priv-app (Privileged APKs)', type: boolean, default: false }
      extract_etc: { description: 'etc (Configs & permissions)', type: boolean, default: false }
      extract_config: { description: 'config (XML feature configs)', type: boolean, default: false }
      extract_lib: { description: 'lib (32-bit libraries)', type: boolean, default: false }
      extract_lib64: { description: 'lib64 (64-bit libraries)', type: boolean, default: false }
      extract_media: { description: 'media (Sounds, fonts)', type: boolean, default: false }
      extract_cameradata: { description: 'cameradata (Camera tuning)', type: boolean, default: false }
      extract_build_prop: { description: 'build.prop (Device properties)', type: boolean, default: false }
      extract_wallpaper_res: { description: 'wallpaper-res.apk', type: boolean, default: false }
      extract_saiv: { description: 'saiv (Samsung AI Vision)', type: boolean, default: false }
      extract_framework_rro: { description: 'framework-res RRO APK', type: boolean, default: false }
      extract_pit: { description: 'PIT file (Partition Table)', type: boolean, default: false }

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq xz-utils lz4 unzip curl android-sdk-libsparse-utils e2fsprogs

      - name: Setup tools
        run: chmod +x bin/lp/* bin/ext4/* bin/erofs-utils/* bin/py_scripts/* upload_gofile.sh scripts/dump.sh

      - name: Extract selected system files
        run: |
          TARGETS=""
          ${{ github.event.inputs.extract_app }} && TARGETS="$TARGETS app"
          ${{ github.event.inputs.extract_priv_app }} && TARGETS="$TARGETS priv-app"
          ${{ github.event.inputs.extract_etc }} && TARGETS="$TARGETS etc"
          ${{ github.event.inputs.extract_config }} && TARGETS="$TARGETS config"
          ${{ github.event.inputs.extract_lib }} && TARGETS="$TARGETS lib"
          ${{ github.event.inputs.extract_lib64 }} && TARGETS="$TARGETS lib64"
          ${{ github.event.inputs.extract_media }} && TARGETS="$TARGETS media"
          ${{ github.event.inputs.extract_cameradata }} && TARGETS="$TARGETS cameradata"
          ${{ github.event.inputs.extract_build_prop }} && TARGETS="$TARGETS build.prop"
          ${{ github.event.inputs.extract_saiv }} && TARGETS="$TARGETS saiv"
          TARGETS="${TARGETS# }"
          
          WANT_SUPER="${{ github.event.inputs.extract_super_config }}"
          WANT_WALLPAPER="${{ github.event.inputs.extract_wallpaper_res }}"
          WANT_RRO="${{ github.event.inputs.extract_framework_rro }}"
          WANT_PIT="${{ github.event.inputs.extract_pit }}"
          
          if [[ -z "$TARGETS" && "$WANT_SUPER" != "true" && "$WANT_WALLPAPER" != "true" && "$WANT_RRO" != "true" && "$WANT_PIT" != "true" ]]; then
            echo "❌ No targets selected"; exit 1
          fi
          
          echo "📥 Downloading..."
          wget -q --no-check-certificate -O "firmware.zip" "${{ github.event.inputs.url }}" || exit 1
          unzip -q -o firmware.zip && rm -f firmware.zip
          
          mkdir -p output
          
          # PIT extraction
          if [[ "$WANT_PIT" == "true" ]]; then
            CSC=$(find . -maxdepth 1 -name "CSC_*.tar*" | head -n1)
            if [[ -n "$CSC" ]]; then
              PIT=$(tar -tf "$CSC" 2>/dev/null | grep -i "\.pit$" | head -n1)
              [[ -n "$PIT" ]] && tar -xf "$CSC" "$PIT" 2>/dev/null && cp "$PIT" "output/" && echo "✅ PIT extracted"
            fi
          fi
          
          # AP extraction
          AP=$(find . -name "AP_*.tar*" | head -n1)
          [[ -z "$AP" ]] && { echo "❌ AP not found"; exit 1; }
          tar -xf "$AP" && rm -f "$AP"
          
          # Locate system/product images
          SUPER=$(find . -maxdepth 1 -name "super.img*" | head -n1)
          if [[ -n "$SUPER" ]]; then
            [[ "$SUPER" == *.lz4 ]] && lz4 -d -q "$SUPER" "super.img" && SUPER="super.img"
            file "$SUPER" | grep -qi sparse && { simg2img "$SUPER" "super.raw.img" 2>/dev/null || bin/ext4/simg2img "$SUPER" "super.raw.img"; SUPER="super.raw.img"; }
            mkdir -p super_dump && bin/lp/lpunpack "$SUPER" super_dump 2>/dev/null || true
            [[ "$WANT_SUPER" == "true" ]] && { cp -r super_dump/configs output/super_config 2>/dev/null || { mkdir -p output/super_config; find super_dump -maxdepth 1 -name "*.cfg" -o -name "*_partition*" | xargs -I{} cp {} output/super_config/ 2>/dev/null; }; }
            SYS_IMG=$(find super_dump -name "system*.img" | head -n1)
            PROD_IMG=$(find super_dump -name "product*.img" | head -n1)
          else
            SYS_IMG=$(find . -maxdepth 1 -name "system.img*" | head -n1)
            PROD_IMG=$(find . -maxdepth 1 -name "product.img*" | head -n1)
            for IMG in "$SYS_IMG" "$PROD_IMG"; do
              [[ -z "$IMG" ]] && continue
              [[ "$IMG" == *.lz4 ]] && lz4 -d -q "$IMG" "${IMG%.lz4}" && IMG="${IMG%.lz4}"
              file "$IMG" | grep -qi sparse && { simg2img "$IMG" "${IMG%.img}_raw.img" 2>/dev/null && mv "${IMG%.img}_raw.img" "$IMG"; }
            done
          fi
          
          # Extract framework RRO from product.img
          if [[ "$WANT_RRO" == "true" && -n "$PROD_IMG" && -f "$PROD_IMG" ]]; then
            mkdir -p prod_tmp
            bin/erofs-utils/extract.erofs -i "$PROD_IMG" -x -o prod_tmp/ 2>/dev/null || debugfs -R "rdump overlay prod_tmp/overlay" "$PROD_IMG" 2>/dev/null || true
            RRO=$(find prod_tmp -name "framework-res__*__auto_generated_rro_product.apk" 2>/dev/null | head -n1)
            [[ -n "$RRO" ]] && cp "$RRO" "output/" && echo "✅ RRO APK extracted"
            rm -rf prod_tmp
          fi
          
          # Extract system contents
          if [[ -n "$TARGETS" || "$WANT_WALLPAPER" == "true" ]]; then
            [[ -z "$SYS_IMG" || ! -f "$SYS_IMG" ]] && { echo "❌ system.img not found"; exit 1; }
            mkdir -p sys_tmp
            if bin/erofs-utils/extract.erofs -i "$SYS_IMG" -x -o sys_tmp/ 2>/dev/null; then
              echo "✅ Extracted via erofs"
            else
              echo "⚠️  erofs failed, trying debugfs..."
              for T in $TARGETS build.prop; do
                for P in "$T" "system/$T"; do
                  debugfs -R "stat $P" "$SYS_IMG" 2>/dev/null | grep -q "Type:" && { debugfs -R "rdump $P sys_tmp/$T" "$SYS_IMG" 2>/dev/null; break; }
                done
              done
            fi
            
            # Copy wallpaper-res.apk if requested
            if [[ "$WANT_WALLPAPER" == "true" ]]; then
              for B in "sys_tmp/priv-app/wallpaper-res" "sys_tmp/system/priv-app/wallpaper-res"; do
                [[ -f "$B/wallpaper-res.apk" ]] && cp "$B/wallpaper-res.apk" "output/" && break
              done
            fi
            
            # Copy selected targets
            for T in $TARGETS; do
              for B in "sys_tmp/$T" "sys_tmp/system/$T" "sys_tmp/system/system/$T"; do
                [[ -e "$B" ]] && { cp -r "$B" "output/"; break; }
              done
            done
            rm -rf sys_tmp
          fi
          
          rm -rf super_dump super.img super.raw.img
          [[ -z "$(ls -A output 2>/dev/null)" ]] && { echo "❌ Nothing extracted"; exit 1; }
          echo "✅ Extracted $(ls output | wc -l) items"

      - name: Upload to GoFile
        run: |
          [[ -d output && -n "$(ls -A output)" ]] || exit 1
          cd output && zip -r ../system-files.zip . && cd ..
          bash upload_gofile.sh system-files.zip
